<svg viewBox="0 0 900 260" width="900" height="260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hydra Evaluator banner">
  <defs>
    <radialGradient id="bg" cx="22%" cy="105%" r="120%">
      <stop offset="0%" stop-color="#15351c"/>
      <stop offset="58%" stop-color="#0c1410"/>
      <stop offset="100%" stop-color="#080a0f"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="260" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="258" rx="17" fill="none" stroke="#234029"/>

  <text x="34" y="56" font-family="Inter,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#89e051">hydra-evaluator</text>
  <text x="36" y="80" font-family="Inter,Segoe UI,sans-serif" font-size="12" letter-spacing="3" fill="#6f8a74">IMAGE EDIT JUDGMENT DECK</text>

  <text x="34" y="134" font-family="Inter,Segoe UI,sans-serif" font-size="42" font-weight="900" fill="#f4fff0">Score the image fight.</text>
  <text x="36" y="166" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#b7c5ba">Drop prompt. Compare A/B. Copy the clean justification.</text>

  <line x1="28" y1="216" x2="872" y2="216" stroke="#1c3322" stroke-width="2"/>
  <text x="36" y="238" font-family="Inter,Segoe UI,sans-serif" font-size="12" letter-spacing="2" fill="#89e051">PROJECT HYDRA // MANUAL OR CLAUDE-ASSISTED</text>

  <g transform="translate(653 142)" filter="url(#glow)">
    <path d="M-94 26 C-72 -34 -28 -30 -4 22 C22 -38 70 -34 92 28" fill="none" stroke="#4ea636" stroke-width="18" stroke-linecap="round"/>
    <ellipse cx="0" cy="42" rx="86" ry="24" fill="#69cf48"/>
    <ellipse cx="0" cy="53" rx="58" ry="16" fill="#8ee86a"/>

    <g transform="translate(-90 -8)">
      <animateTransform attributeName="transform" type="translate" values="-90 -8;-90 -18;-90 -8" keyTimes="0;0.5;1" dur="1.8s" repeatCount="indefinite"/>
      <circle r="24" fill="#69cf48"/>
      <circle cx="-8" cy="-6" r="6" fill="#ffffff"/>
      <circle cx="9" cy="-6" r="6" fill="#ffffff"/>
      <circle cx="-6" cy="-5" r="2.8" fill="#10240a"/>
      <circle cx="11" cy="-5" r="2.8" fill="#10240a"/>
      <path d="M-9 8 Q0 15 10 8" fill="none" stroke="#1d4b22" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g transform="translate(0 -28)">
      <animateTransform attributeName="transform" type="translate" values="0 -28;0 -43;0 -28" keyTimes="0;0.5;1" dur="1.55s" repeatCount="indefinite"/>
      <circle r="27" fill="#7be35d"/>
      <circle cx="-9" cy="-7" r="6.5" fill="#ffffff"/>
      <circle cx="10" cy="-7" r="6.5" fill="#ffffff"/>
      <circle cx="-7" cy="-6" r="3" fill="#10240a"/>
      <circle cx="12" cy="-6" r="3" fill="#10240a"/>
      <path d="M-11 10 Q0 17 12 10" fill="none" stroke="#1d4b22" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g transform="translate(92 -4)">
      <animateTransform attributeName="transform" type="translate" values="92 -4;92 -16;92 -4" keyTimes="0;0.5;1" dur="1.9s" repeatCount="indefinite"/>
      <circle r="24" fill="#69cf48"/>
      <circle cx="-8" cy="-6" r="6" fill="#ffffff"/>
      <circle cx="9" cy="-6" r="6" fill="#ffffff"/>
      <circle cx="-6" cy="-5" r="2.8" fill="#10240a"/>
      <circle cx="11" cy="-5" r="2.8" fill="#10240a"/>
      <path d="M-9 8 Q0 15 10 8" fill="none" stroke="#1d4b22" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <polyline points="455,154 505,116 538,134 584,92 624,109" fill="none" stroke="#b6ff43" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0">
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.35;0.5;0.65;1" dur="1.6s" repeatCount="indefinite"/>
  </polyline>
  <text x="506" y="105" font-family="Inter,Segoe UI,sans-serif" font-size="24" font-weight="900" fill="#b6ff43" opacity="0">ZAP
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.35;0.52;0.7;1" dur="1.6s" repeatCount="indefinite"/>
  </text>

  <circle cx="818" cy="48" r="14" fill="#f4ff5a" opacity="0.55" filter="url(#soft)">
    <animate attributeName="opacity" values="0.25;0.8;0.25" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="11;17;11" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="818" cy="48" r="4" fill="#fff7b0"/>
</svg>
