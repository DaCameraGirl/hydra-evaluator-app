<svg xmlns="http://www.w3.org/2000/svg" width="920" height="220" viewBox="0 0 920 220" role="img" aria-label="Hydra Evaluator">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="50%" stop-color="#12102a"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ba9ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ba9ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6ba9ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="920" height="220" rx="18" fill="url(#bg)"/>
  <rect x="-200" y="0" width="240" height="220" rx="18" fill="url(#shimmer)" opacity="0.9">
    <animate attributeName="x" values="-240;920" dur="7s" repeatCount="indefinite"/>
  </rect>
  <rect x="1" y="1" width="918" height="218" rx="17" fill="none" stroke="#6ba9ff" stroke-width="2" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.65;0.35" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="56" y="72" width="80" height="56" rx="8" fill="rgba(65,217,154,0.06)" stroke="#6ba9ff" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="64" y="80" width="20" height="14" rx="2" fill="#bc8cff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="88" y="96" width="24" height="18" rx="2" fill="none" stroke="#6ba9ff" stroke-width="1.5">
    <animate attributeName="y" values="96;104;96" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <line x1="56" y1="72" x2="136" y2="72" stroke="#bc8cff" stroke-width="2" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 56; 0 0" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <text x="170" y="92" fill="#f8fbff" font-family="Segoe UI, system-ui, sans-serif" font-size="38" font-weight="800">Hydra Evaluator</text>
  <text x="170" y="126" fill="#9db4d1" font-family="Segoe UI, system-ui, sans-serif" font-size="17" font-weight="500">Browser tool for image-edit model evaluation, with optional Claude auto-grading.</text>
  <rect x="170" y="148" width="104" height="28" rx="14" fill="rgba(188,140,255,0.14)" stroke="#6ba9ff66" stroke-width="1">
    <animate attributeName="opacity" values="1;0.75;1" dur="2.5s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="222" y="167" fill="#6ba9ff" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">IMAGE EVAL</text>
  <rect x="286" y="148" width="120" height="28" rx="14" fill="rgba(188,140,255,0.14)" stroke="#bc8cff66" stroke-width="1">
    <animate attributeName="opacity" values="1;0.75;1" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <text x="346" y="167" fill="#bc8cff" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">CLAUDE GRADE</text>
</svg>